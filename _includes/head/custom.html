<!-- Custom typography + publication-card styles -->
<style>
  /* Hide the empty footer container (gray box) */
  .page__footer { display: none !important; }

  /* Body-content links: HKUST navy. Nav and sidebar stay black. */
  .page__content a:link,
  .page__content a:visited {
    color: #003C71;  /* HKUST navy */
  }
  .page__content a:hover {
    color: #1a73e8;
  }
  .greedy-nav a,
  .greedy-nav a:link,
  .greedy-nav a:visited,
  .author__urls a,
  .author__urls a:link,
  .author__urls a:visited {
    color: #000 !important;
  }
  .greedy-nav a:hover,
  .author__urls a:hover {
    color: #003C71 !important;
  }
  /* Re-enable clicking on the "selected" (current page) nav item — theme disables it by default */
  .masthead__menu-item.selected a {
    pointer-events: auto !important;
    cursor: pointer !important;
  }

  /* Custom JS handles scroll; disable CSS smooth-scroll to avoid double-easing */
  html { scroll-behavior: auto; }

  /* Don't override the colored paper-link badges */
  .paper-links a,
  .paper-links a:link,
  .paper-links a:visited,
  .paper-links a:hover {
    color: #fff !important;
  }

  /* Compact base font for the main article column */
  .page__content {
    font-size: 15px;
    line-height: 1.55;
  }
  .page__content h1 {
    font-size: 1.55em;
    margin-top: 1.5em;
    margin-bottom: 0.4em;
    border-bottom: 2px solid #eee;
    padding-bottom: 0.2em;
  }
  .page__content h1:first-of-type {
    margin-top: 0.4em;
  }

  /* Paper-box layout — card per publication */
  .paper-box {
    display: flex;
    gap: 1.2em;
    margin: 1em 0;
    padding-bottom: 0.9em;
    border-bottom: 1px solid #eee;
    align-items: flex-start;
  }
  .paper-box-image {
    flex: 0 0 180px;
    max-width: 180px;
  }
  .paper-box-image img {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 4px;
  }
  .paper-box-text {
    flex: 1;
    min-width: 0;
  }
  .paper-title {
    font-weight: 600;
    margin: 0 0 0.25em 0 !important;
    font-size: 1.02em;
    line-height: 1.35;
  }
  .paper-authors {
    margin: 0 0 0.35em 0 !important;
    color: #555;
    font-size: 0.93em;
  }
  .paper-meta {
    margin: 0 0 0.25em 0 !important;
    font-style: italic;
    color: #444;
    font-size: 0.93em;
  }
  .paper-meta-highlight {
    background: #ff5722;
    color: #fff;
    padding: 0.08em 0.5em;
    border-radius: 3px;
    font-weight: 600;
    font-style: normal;
    font-size: 0.78em;
    margin-left: 0.35em;
    vertical-align: 2px;
    letter-spacing: 0.02em;
  }
  .paper-meta-highlight.spotlight { background: #6f42c1; }
  .paper-meta-highlight.oral-pending { background: #fd7e14; }
  .paper-extra {
    margin: 0.3em 0 0 0 !important;
    color: #666;
    font-size: 0.86em;
    font-style: italic;
    line-height: 1.45;
  }
  .paper-links {
    margin: 0 0 0.35em 0 !important;
    font-size: 0.82em;
  }
  .paper-links a {
    display: inline-block;
    padding: 0.1em 0.55em;
    margin-right: 0.3em;
    border-radius: 3px;
    text-decoration: none !important;
    color: #fff !important;
    font-weight: 500;
  }
  .paper-link-arxiv      { background: #b31b1b; }
  .paper-link-openreview { background: #8c1515; }
  .paper-link-details    { background: #6c757d; }
  .paper-link-github     { background: #333; }

  @media (max-width: 600px) {
    .paper-box { flex-direction: column; }
    .paper-box-image { flex: none; max-width: 100%; }
  }
</style>

<!-- Intercept all top-nav clicks on same-page anchors: smooth scroll, NO URL change, NO reload. -->
<!-- Capture-phase listener so it runs before greedy-nav's own handlers. -->
<script>
  (function () {
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    function smoothScrollTo(targetY) {
      var startY = window.pageYOffset;
      var distance = targetY - startY;
      if (Math.abs(distance) < 1) return;
      // Snappy ease-out: short for nearby targets, capped for far ones.
      var duration = Math.min(550, Math.max(250, Math.abs(distance) * 0.3));
      var startTime = performance.now();
      function step(now) {
        var p = Math.min((now - startTime) / duration, 1);
        window.scrollTo(0, startY + distance * easeOutCubic(p));
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function bind() {
      document.querySelectorAll('.greedy-nav a').forEach(function (link) {
        if (link.dataset.smoothBound) return;
        link.dataset.smoothBound = '1';

        var href = link.getAttribute('href');
        if (!href) return;
        if (/\.(pdf|html?)$/i.test(href)) return;
        if (/^(mailto:|javascript:|tel:)/i.test(href)) return;

        var url;
        try { url = new URL(href, window.location.origin); } catch (e) { return; }
        if (url.origin !== window.location.origin) return;

        link.addEventListener('click', function (e) {
          if (window.location.pathname !== url.pathname) return;
          e.preventDefault();
          e.stopPropagation();
          var targetY = 0;
          if (url.hash) {
            var target = document.querySelector(url.hash);
            if (!target) return;
            targetY = target.getBoundingClientRect().top + window.pageYOffset - 20;
            if (targetY < 0) targetY = 0;
          }
          smoothScrollTo(targetY);
        }, true);  // capture phase — runs before any other click listener
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bind);
    } else {
      bind();
    }
  })();
</script>
